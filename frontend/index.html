<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猪猪系统</title>
  <style>
    :root{--bg:#f5f5f1;--panel:#fff;--soft:#f0efe8;--line:#dfddd2;--text:#1f1f1a;--muted:#6e6a5f;--accent:#1f7a5c;--accent-soft:#e7f4ee;--danger:#c94949;--shadow:0 18px 50px rgba(25,32,24,.08)}
    *{box-sizing:border-box}html,body{margin:0;height:100%;background:radial-gradient(circle at top,#fbfbf7 0%,var(--bg) 55%,#ebe9de 100%);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input,textarea,select{font:inherit}button{cursor:pointer}
    .app{height:100vh;display:grid;grid-template-columns:280px minmax(0,1fr) 350px;gap:16px;padding:16px}
    .side,.main,.panel{background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);box-shadow:var(--shadow);border-radius:24px;min-height:0}
    .side{display:flex;flex-direction:column;overflow:hidden}.brand{padding:20px 18px 16px;border-bottom:1px solid var(--line)}.brand h1{margin:0;font-size:20px}.brand p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .stack{display:grid;gap:10px}.pad{padding:14px}.scroll{overflow:auto;min-height:0}.label{margin:0 0 10px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .btn,.ghost,.danger{width:100%;border:0;border-radius:14px;padding:12px 14px;transition:.18s}.btn{background:var(--accent);color:#fff;font-weight:600}.ghost{background:var(--soft);color:var(--text);font-weight:600}.danger{background:rgba(201,73,73,.1);color:var(--danger);font-weight:600}
    .btn:hover,.ghost:hover,.danger:hover,.item:hover,.toolbar button:hover{transform:translateY(-1px)}
    .item{width:100%;text-align:left;padding:12px 14px;border-radius:16px;border:1px solid transparent;background:transparent;transition:.2s}.item:hover{background:rgba(31,122,92,.06)}.item.active{background:var(--accent-soft);border-color:rgba(31,122,92,.22)}
    .row{display:flex;align-items:center;gap:12px}.avatar{width:38px;height:38px;border-radius:12px;background:#f2f7f4;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}.avatar img,.ava img,.avatar-preview img{width:100%;height:100%;object-fit:cover;display:block}.title{font-weight:600;line-height:1.3}.sub{color:var(--muted);font-size:12px;line-height:1.4;margin-top:3px}
    .delete,.mini-action{margin-left:auto;border:0;background:transparent;color:var(--muted);padding:4px 6px;border-radius:8px}.delete:hover{color:var(--danger);background:rgba(201,73,73,.08)}.mini-action:hover{color:var(--accent);background:rgba(31,122,92,.08)}
    .main{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.head{padding:20px 24px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.head h2{margin:0;font-size:18px}.head p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar button{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 12px;transition:.18s}
    .msgs{overflow:auto;padding:28px 22px}.msgs-inner{max-width:960px;margin:0 auto;display:grid;gap:20px}.empty{min-height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:32px}.empty-card{max-width:520px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:24px;padding:28px}.empty h3{margin:0 0 8px;color:var(--text);font-size:28px}
    .msg{display:grid;grid-template-columns:52px minmax(0,1fr);gap:14px;align-items:start}.msg.user{grid-template-columns:minmax(0,1fr) 52px}.msg.user .wrap{order:-1}.msg .ava{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f4f4ef;border:1px solid var(--line);overflow:hidden}.msg.user .ava{background:#17202a;color:#fff}
    .wrap{display:grid;gap:8px}.meta{display:flex;gap:10px;color:var(--muted);font-size:12px;align-items:center;flex-wrap:wrap}.bubble{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;padding:16px 18px;line-height:1.72;font-size:15px;white-space:pre-wrap;word-break:break-word}.msg.user .bubble{background:#f1f5f9}.bubble pre{margin:14px 0;padding:14px;border-radius:14px;background:#101826;color:#ecf4ff;overflow:auto}.bubble code{font-family:Consolas,monospace}
    .composer{border-top:1px solid var(--line);padding:16px 18px 18px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(248,247,242,.9))}.composer-inner{max-width:860px;margin:0 auto}.box{border:1px solid var(--line);border-radius:24px;background:#fff;padding:14px;display:grid;gap:12px;box-shadow:0 12px 30px rgba(0,0,0,.05)}textarea{width:100%;border:0;resize:none;outline:none;min-height:54px;max-height:220px;font-size:15px;line-height:1.6;color:var(--text);background:transparent}
    .compose-tools{display:flex;gap:8px;flex-wrap:wrap}.compose-tools button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;color:var(--muted)}.compose-tools button.active{background:var(--accent-soft);border-color:rgba(31,122,92,.25);color:var(--accent);font-weight:600}.compose-meta{display:flex;gap:8px;flex-wrap:wrap}
    .foot{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.hint{color:var(--muted);font-size:12px}.send{display:flex;gap:8px}.send button{border:0;border-radius:14px;padding:10px 16px;font-weight:600}.send .go{background:var(--accent);color:#fff}.send .stop{background:rgba(201,73,73,.14);color:var(--danger);display:none}
    .search-cards{display:grid;gap:10px}.search-card{display:grid;gap:8px;padding:14px;border-radius:16px;background:#fbfaf4;border:1px solid #e2ddce}.search-card a{color:#1a5fb4;text-decoration:none;font-weight:700}.search-card a:hover{text-decoration:underline}.search-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}.search-snippet{font-size:14px;line-height:1.65;color:#2c2b26}
    .panel{display:flex;flex-direction:column;overflow:hidden}.panel-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.panel-head h2{margin:0;font-size:18px}.panel-scroll{overflow:auto;padding:18px;display:grid;gap:18px}
    .card{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:18px;padding:16px;display:grid;gap:12px}.card h3{margin:0;font-size:14px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 12px;color:var(--text)}.field textarea{min-height:140px;resize:vertical}
    .inline{display:flex;gap:8px;flex-wrap:wrap}.inline button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px}.chip{display:inline-flex;align-items:center;gap:8px;border-radius:999px;background:var(--soft);padding:9px 12px;font-size:12px;color:var(--muted)}.dot{width:9px;height:9px;border-radius:50%;background:#b7b2a8}.dot.on{background:#24a36c}.split-actions{display:flex;gap:8px;flex-wrap:wrap}
    .avatar-preview{width:72px;height:72px;border-radius:20px;background:#f4f4ef;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden}
    .models{display:grid;gap:8px;max-height:180px;overflow:auto;padding-right:4px}.model{font-size:12px;color:var(--muted);border:1px dashed var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.6)}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,17,19,.34);padding:20px}.modal.open{display:flex}.modal-card{width:min(640px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 28px 80px rgba(0,0,0,.18);padding:22px;display:grid;gap:14px}.modal-card h2,.modal-card p{margin:0}
    .typing{display:inline-flex;align-items:center;gap:6px;min-height:24px}.typing span{width:7px;height:7px;border-radius:50%;background:#8f8b81;animation:blink 1.1s infinite ease-in-out}.typing span:nth-child(2){animation-delay:.16s}.typing span:nth-child(3){animation-delay:.32s}.streaming .bubble::after{content:"";display:inline-block;width:8px;height:1.2em;margin-left:4px;vertical-align:middle;background:var(--accent);animation:cursor 1s steps(1) infinite}.toast{position:fixed;right:24px;bottom:24px;background:#17202a;color:#fff;padding:12px 16px;border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,.2);opacity:0;transform:translateY(12px);transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}
    .app.side-collapsed{grid-template-columns:minmax(0,1fr) 350px}.app.side-collapsed .side{display:none}.app.panel-collapsed{grid-template-columns:280px minmax(0,1fr)}.app.panel-collapsed .panel{display:none}.app.side-collapsed.panel-collapsed{grid-template-columns:minmax(0,1fr)}
    .app.side-collapsed.panel-collapsed .main{background:transparent;border-color:transparent;box-shadow:none;backdrop-filter:none}
    .app.side-collapsed.panel-collapsed .head{max-width:1180px;width:100%;margin:0 auto;padding:18px 20px 14px;border-bottom:0}
    .app.side-collapsed.panel-collapsed .msgs{padding:12px 24px 10px}
    .app.side-collapsed.panel-collapsed .msgs-inner{max-width:980px}
    .app.side-collapsed.panel-collapsed .composer{border-top:0;background:linear-gradient(180deg,rgba(245,245,241,0),rgba(245,245,241,.82) 24%,rgba(245,245,241,.96) 100%);padding:10px 18px 20px}
    .app.side-collapsed.panel-collapsed .composer-inner{max-width:920px}
    .app.side-collapsed.panel-collapsed .box{max-width:780px;margin:0 auto;border-radius:28px;padding:10px 12px 10px;box-shadow:0 16px 36px rgba(20,24,18,.08)}
    .app.side-collapsed.panel-collapsed textarea{min-height:38px;font-size:14px}
    .app.side-collapsed.panel-collapsed .compose-tools{gap:6px}
    .app.side-collapsed.panel-collapsed .compose-tools button{padding:6px 10px;border-radius:10px;font-size:13px}
    .app.side-collapsed.panel-collapsed .send .go,.app.side-collapsed.panel-collapsed .send .stop{padding:8px 13px;border-radius:11px}
    .app.side-collapsed.panel-collapsed .hint{font-size:11px}
    @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}@keyframes cursor{50%{opacity:0}}
    @media (max-width:1280px){.app{grid-template-columns:260px minmax(0,1fr)}.panel{position:fixed;top:16px;right:16px;bottom:16px;width:min(350px,calc(100vw - 32px));z-index:20;display:none}.panel.open{display:flex}}
    @media (max-width:900px){.app{grid-template-columns:1fr;padding:10px}.side{display:none}.head{padding:16px}.msgs{padding:18px 12px}.composer{padding:12px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><h1>猪猪系统</h1><p>多角色、多模型、独立记忆的 AI 对话工作台</p></div>
      <div class="pad stack">
        <button class="btn" id="newChatBtn">+ 新对话</button>
        <button class="ghost" id="newRoleBtn">+ 新角色</button>
        <div class="split-actions"><button class="ghost" id="importRoleBtn" type="button">导入角色</button><button class="ghost" id="exportRoleBtn" type="button">导出当前</button></div>
      </div>
      <div class="pad scroll"><h3 class="label">AI 角色</h3><div class="stack" id="roleList"></div></div>
      <div class="pad scroll"><h3 class="label">当前角色会话</h3><div class="stack" id="sessionList"></div></div>
    </aside>
    <main class="main">
      <header class="head">
        <div class="row">
          <div class="avatar" id="roleAvatar">🐷</div>
          <div><h2 id="roleName">猪猪</h2><p id="roleMeta">选择角色并开始对话</p></div>
        </div>
        <div class="toolbar">
          <button id="toggleSideBtn">角色</button>
          <button id="togglePanelBtn">设置</button>
          <button id="refreshBtn">刷新</button>
        </div>
      </header>
      <section class="msgs" id="msgs">
        <div class="empty" id="empty"><div class="empty-card"><h3>开始一个清爽的新对话</h3><p>左侧选择角色，右侧调整模型与 Prompt。每个角色都会拥有自己独立的会话、记忆和人格数据。</p></div></div>
        <div class="msgs-inner" id="msgsInner"></div>
      </section>
      <footer class="composer">
        <div class="composer-inner">
          <div class="box">
            <div class="compose-tools">
              <button id="attachBtn" type="button">+</button>
              <button id="modeChatBtn" type="button" class="active">聊天</button>
              <button id="modeSearchBtn" type="button">网搜</button>
              <button id="modeVisionBtn" type="button">看图</button>
            </div>
            <div class="compose-meta" id="composeMeta"></div>
            <textarea id="input" placeholder="输入消息，按 Enter 发送，Shift + Enter 换行"></textarea>
            <div class="foot">
              <div class="hint" id="composerHint">聊天会绑定到当前角色的独立记忆系统</div>
              <div class="send"><button class="stop" id="stopBtn" type="button">停止</button><button class="go" id="sendBtn" type="button">发送</button></div>
            </div>
          </div>
        </div>
      </footer>
    </main>
    <aside class="panel" id="panel">
      <div class="panel-head"><h2>全局模型设置</h2><button class="ghost" id="saveBtn" style="width:auto;padding:10px 14px">保存</button></div>
      <div class="panel-scroll">
        <section class="card">
          <h3>服务端</h3>
          <div class="field"><label>后端 API 地址</label><input id="apiBase" type="text" placeholder="http://localhost:5181"></div>
          <div class="inline"><button id="applyApiBtn" type="button">应用地址</button><button id="checkBtn" type="button">检测后端</button><span class="chip"><span class="dot" id="backendDot"></span><span id="backendText">未检测</span></span></div>
        </section>
        <section class="card">
          <h3>模型</h3>
          <div class="field"><label>聊天提供方</label><select id="cfgProvider"><option value="minimax">MiniMax</option><option value="api">OpenAI 兼容 API</option><option value="ollama">Ollama</option></select></div>
          <div class="field"><label>聊天模型</label><input id="cfgChatModel" type="text" list="chatModelOptions" placeholder="可输入，也可下拉选择"></div>
          <div class="field"><label>视觉模型</label><input id="cfgVisionModel" type="text" list="visionModelOptions" placeholder="主模型不支持看图时再作为后备"></div>
          <div class="field"><label>向量模型</label><input id="cfgEmbeddingModel" type="text" list="embeddingModelOptions" placeholder="可输入，也可下拉选择"></div>
          <div class="field"><label>温度</label><input id="cfgTemperature" type="number" step="0.1" min="0" max="2"></div>
        </section>
        <section class="card">
          <h3>接入地址</h3>
          <div class="field"><label>聊天 Ollama 地址</label><input id="cfgChatHost" type="text" placeholder="http://127.0.0.1:11434"></div>
          <div class="field"><label>向量 Ollama 地址</label><input id="cfgEmbeddingHost" type="text" placeholder="http://127.0.0.1:11435"></div>
          <div class="field"><label>API Base URL</label><input id="cfgApiBaseUrl" type="text" placeholder="https://api.minimaxi.com/v1"></div>
          <div class="field"><label>API Key</label><input id="cfgApiKey" type="password" placeholder="sk-..."></div>
          <div class="inline"><button id="loadChatModelsBtn" type="button">读取聊天/视觉模型</button><button id="loadEmbeddingModelsBtn" type="button">读取向量模型</button></div>
          <div class="models" id="modelList"></div>
        </section>
        <section class="card">
          <h3>记忆与对话参数</h3>
          <div class="field"><label>启用两步分析</label><select id="cfgAnalysis"><option value="true">启用</option><option value="false">关闭</option></select></div>
          <div class="field"><label>长期记忆检索条数</label><input id="cfgMemoryTopK" type="number" min="1" max="50"></div>
          <div class="field"><label>当前对话历史条数</label><input id="cfgHistoryLimit" type="number" min="1" max="50"></div>
        </section>
        <section class="card">
          <h3>角色记忆管理</h3>
          <div class="field"><label>搜索记忆</label><input id="memoryQuery" type="text" placeholder="输入关键词后搜索"></div>
          <div class="inline"><button id="searchMemoryBtn" type="button">搜索</button><button id="reloadMemoryBtn" type="button">刷新列表</button></div>
          <div class="models" id="memoryList"></div>
        </section>
      </div>
    </aside>
  </div>
  <datalist id="chatModelOptions"></datalist>
  <datalist id="visionModelOptions"></datalist>
  <datalist id="embeddingModelOptions"></datalist>
  <input id="imageInput" type="file" accept="image/*,.txt,.md,.json,.csv,.py,.js,.html,.css,.xml,.yaml,.yml,.log" multiple hidden>
  <div class="modal" id="roleModal">
    <div class="modal-card">
      <h2 id="roleModalTitle">创建新角色</h2>
      <p id="roleModalDesc">创建后，服务端会为这个角色建立独立的会话、记忆和人格目录。</p>
      <div class="field"><label>角色名称</label><input id="newName" type="text" placeholder="例如：技术猪猪"></div>
      <div class="field"><label>头像</label><div class="inline"><div class="avatar-preview" id="newAvatarPreview">🤖</div><input id="newAvatar" type="text" maxlength="8" placeholder="可填 emoji，或上传图片"><button id="pickAvatarBtn" type="button">上传头像</button></div></div>
      <div class="field"><label>角色简介</label><input id="newDesc" type="text" placeholder="例如：偏代码助手"></div>
      <div class="field"><label>角色 Prompt</label><textarea id="newPrompt" style="min-height:120px"></textarea></div>
      <div class="inline"><button id="closeModalBtn" type="button">取消</button><button id="deleteRoleBtn" type="button">删除角色</button><button id="createRoleBtn" type="button">保存角色</button></div>
    </div>
  </div>
  <div class="modal" id="importModal">
    <div class="modal-card">
      <h2>导入角色</h2>
      <p>粘贴角色导出 JSON。可用于迁移某个角色的配置、会话、记忆和成长数据。</p>
      <div class="field"><label>导入 JSON</label><textarea id="importJson" style="min-height:220px"></textarea></div>
      <div class="field"><label>导入模式</label><select id="importOverwrite"><option value="false">存在同名角色时拒绝</option><option value="true">覆盖同名角色</option></select></div>
      <div class="inline"><button id="closeImportModalBtn" type="button">取消</button><button id="submitImportBtn" type="button">开始导入</button></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <input id="avatarUploadInput" type="file" accept="image/*" hidden>
  <script>
    const MODEL_PRESETS={chat:["MiniMax-M2.5-highspeed","MiniMax-Text-01","gpt-4o-mini","gpt-4.1-mini","qwen2.5:14b","qwen3:8b","deepseek-r1:8b"],vision:["MiniMax-M2.5-highspeed","gpt-4o-mini","gpt-4.1-mini","qwen2.5-vl:7b","qwen3-vl:8b","llava:13b","huihui_ai/qwen3-vl-abliterated:8b"],embedding:["bge-large","bge-m3","nomic-embed-text","mxbai-embed-large"]};
    const state={apiBase:localStorage.getItem("pig-api-base")||guessApiBase(),roles:[],roleId:"default",role:null,sessions:[],sessionId:null,sending:false,currentAbort:null,sideCollapsed:localStorage.getItem("pig-side-collapsed")==="1",panelCollapsed:localStorage.getItem("pig-panel-collapsed")==="1",streamRender:null,composeMode:"chat",pendingImages:[],pendingDocs:[],globalSettings:{},roleModalMode:"create",modelOptions:{chat:[...MODEL_PRESETS.chat],vision:[...MODEL_PRESETS.vision],embedding:[...MODEL_PRESETS.embedding]}};
    function guessApiBase(){if(location.protocol.startsWith("http")){const port=location.port==="5180"?"5181":location.port;return `${location.protocol}//${location.hostname}${port?":"+port:""}`}return "http://localhost:5181"}
    const $=id=>document.getElementById(id), esc=t=>{const d=document.createElement("div");d.textContent=t||"";return d.innerHTML};
    const api=p=>`${state.apiBase}${p}`;
    async function j(path,opt={}){const r=await fetch(api(path),opt);if(!r.ok)throw new Error(await r.text()||`HTTP ${r.status}`);return r.json()}
    function toast(msg){$("toast").textContent=msg;$("toast").classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>$("toast").classList.remove("show"),2400)}
    function fmt(ts){if(!ts)return"";const d=new Date(ts);if(Number.isNaN(d.getTime()))return"";return d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}
    function md(text){return esc(text||"").replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`)}
    function setApiBase(){state.apiBase=$("apiBase").value.trim()||guessApiBase();localStorage.setItem("pig-api-base",state.apiBase)}
    function setSending(v){state.sending=v;$("sendBtn").disabled=v;$("stopBtn").style.display=v?"inline-flex":"none"}
    function setComposeMode(mode){state.composeMode=mode;["chat","search","vision"].forEach(name=>$(`mode${name.charAt(0).toUpperCase()+name.slice(1)}Btn`).classList.toggle("active",name===mode));updateComposeMeta()}

    function clearStreamRender(){const s=state.streamRender;if(!s)return;if(s.timer)clearTimeout(s.timer);state.streamRender=null}
    function stepStreamRender(){const s=state.streamRender;if(!s||!s.el)return;if(!s.queue){s.timer=null;return}const chars=[...s.queue];const head=chars[0]||"";let take=1;if(chars.length>24)take=4;else if(chars.length>12)take=3;else if(chars.length>4)take=2;if(/[，。！？；：,.!?;:\n]/.test(head))take=1;const chunk=chars.slice(0,take).join("");s.queue=chars.slice(take).join("");s.visible+=chunk;s.el.dataset.content=s.visible;s.el.classList.remove("loading");s.el.classList.add("streaming");s.el.querySelector(".bubble").innerHTML=md(s.visible);scrollBottom();const delay=/[，。！？；：,.!?;:\n]/.test(chunk.slice(-1))?34:12;s.timer=setTimeout(stepStreamRender,delay)}

    async function deleteRole(){if(!state.roleId||state.roleId==="default"){toast("默认角色不能删除");return}if(!confirm(`确认删除角色「${state.role?.name||state.roleId}」吗？该角色的会话、记忆和成长数据都会一起删除。`))return;await j(`/api/roles/${state.roleId}`,{method:"DELETE"});openModal(false);state.roleId="default";state.sessionId=null;await loadRoles();toast("角色已删除")}
    async function loadMemories(){if(!state.roleId)return;const q=$("memoryQuery").value.trim();const url=q?`/api/roles/${state.roleId}/memories?query=${encodeURIComponent(q)}&limit=100`:`/api/roles/${state.roleId}/memories?limit=100`;const data=await j(url);renderMemories(data.items||[])}
    function renderMemories(items){$("memoryList").innerHTML=!items.length?`<div class="model">当前角色暂无匹配记忆</div>`:items.map(m=>`<div class="model"><div style="font-weight:600;color:#1f1f1a;margin-bottom:6px">${esc(m.type||"context")} · ${(m.score??m.importance??0).toFixed?Number(m.score??m.importance??0).toFixed(2):esc(m.importance||"")}</div><div style="white-space:pre-wrap;line-height:1.5">${esc(m.content||"")}</div><div class="inline" style="margin-top:8px"><button type="button" data-edit-memory="${m.id}">编辑</button><button type="button" data-del-memory="${m.id}">删除</button></div></div>`).join("");document.querySelectorAll("[data-edit-memory]").forEach(b=>b.onclick=()=>editMemory(b.dataset.editMemory));document.querySelectorAll("[data-del-memory]").forEach(b=>b.onclick=()=>deleteMemory(b.dataset.delMemory))}
    async function editMemory(id){const current=(await j(`/api/roles/${state.roleId}/memories?limit=100`)).items.find(m=>m.id===id);if(!current){toast("记忆不存在");return}const content=prompt("编辑记忆内容",current.content||"");if(content===null)return;const importanceText=prompt("重要度 0-1",String(current.importance??0.5));if(importanceText===null)return;await j(`/api/roles/${state.roleId}/memories/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({content,importance:Number(importanceText||current.importance||0.5),type:current.type,tags:current.tags||[]})});await loadMemories();toast("记忆已更新")}
    async function deleteMemory(id){if(!confirm("确认删除这条记忆吗？"))return;await j(`/api/roles/${state.roleId}/memories/${id}`,{method:"DELETE"});await loadMemories();toast("记忆已删除")}
    async function loadModels(host,kind){$("modelList").innerHTML="";if(!host){toast("请先填写 Ollama 地址");return}try{const data=await j(`/api/models?host=${encodeURIComponent(host)}`);if(data.status!=="online"){$("modelList").innerHTML=`<div class="model">主机离线：${esc(data.error||"未知错误")}</div>`;return}const models=(data.models||[]).map(m=>m.name||"").filter(Boolean);if(!models.length){$("modelList").innerHTML=`<div class="model">该主机没有返回可用模型</div>`;return}if(kind==="embedding"){mergeModelOptions("embedding",models)}else{mergeModelOptions("chat",models);mergeModelOptions("vision",models)}$("modelList").innerHTML=models.map(name=>`<button class="model" type="button" data-model="${esc(name)}" data-kind="${kind}">${esc(name)}</button>`).join("");document.querySelectorAll("[data-model]").forEach(b=>b.onclick=()=>{if(b.dataset.kind==="embedding"){$("cfgEmbeddingModel").value=b.dataset.model;return}if(document.activeElement===$("cfgVisionModel")){$("cfgVisionModel").value=b.dataset.model;return}$("cfgChatModel").value=b.dataset.model})}catch(e){$("modelList").innerHTML=`<div class="model">读取模型失败：${esc(e.message)}</div>`}}
    async function refreshAll(){const keep=state.sessionId;await checkBackend();state.sessionId=keep;await loadRoles(false);toast("已刷新")}
    async function onAvatarUpload(e){const file=(e.target.files||[])[0];if(!file)return;const data=await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||""));reader.onerror=()=>reject(new Error("头像读取失败"));reader.readAsDataURL(file)});$("newAvatar").value=String(data);setAvatarEl($("newAvatarPreview"),String(data));e.target.value=""}
    function bind(){$("apiBase").value=state.apiBase;$("newChatBtn").onclick=newSession;$("newRoleBtn").onclick=()=>{state.roleModalMode="create";fillRoleModal({avatar:"🤖",system_prompt:state.role?.system_prompt||""});openModal(true)};$("closeModalBtn").onclick=()=>openModal(false);$("createRoleBtn").onclick=createRole;$("saveBtn").onclick=saveGlobalSettings;$("applyApiBtn").onclick=async()=>{setApiBase();await checkBackend();await loadGlobalSettings();await loadRoles()};$("checkBtn").onclick=checkBackend;$("refreshBtn").onclick=refreshAll;$("sendBtn").onclick=send;$("stopBtn").onclick=()=>{if(state.currentAbort)state.currentAbort.abort();else setSending(false)};$("togglePanelBtn").onclick=togglePanel;$("toggleSideBtn").onclick=toggleSide;$("cfgProvider").onchange=syncModelByProvider;$("loadChatModelsBtn").onclick=()=>loadModels($("cfgChatHost").value.trim(),"chat");$("loadEmbeddingModelsBtn").onclick=()=>loadModels($("cfgEmbeddingHost").value.trim(),"embedding");$("exportRoleBtn").onclick=exportRole;$("importRoleBtn").onclick=()=>openImportModal(true);$("deleteRoleBtn").onclick=deleteRole;$("pickAvatarBtn").onclick=()=>$("avatarUploadInput").click();$("newAvatar").addEventListener("input",e=>setAvatarEl($("newAvatarPreview"),e.target.value||"🤖"));$("avatarUploadInput").addEventListener("change",onAvatarUpload);$("closeImportModalBtn").onclick=()=>openImportModal(false);$("submitImportBtn").onclick=submitImport;$("searchMemoryBtn").onclick=loadMemories;$("reloadMemoryBtn").onclick=()=>{$("memoryQuery").value="";loadMemories()};$("attachBtn").onclick=()=>$("imageInput").click();$("modeChatBtn").onclick=()=>setComposeMode("chat");$("modeSearchBtn").onclick=()=>setComposeMode("search");$("modeVisionBtn").onclick=()=>setComposeMode("vision");$("imageInput").addEventListener("change",async e=>{try{const {images,docs,unsupported}=await splitFiles(e.target.files);state.pendingImages=images;state.pendingDocs=docs;injectDocsIntoInput(docs);updateComposeMeta();if(images.length&&docs.length)toast(`已选择 ${images.length} 张图片，导入 ${docs.length} 份文档`);else if(images.length)toast(`已选择 ${images.length} 张图片`);else if(docs.length)toast(`已导入 ${docs.length} 份文档到输入框`);if(unsupported.length)toast(`这些文件暂不支持：${unsupported.slice(0,3).join("、")}`)}catch(err){toast(err.message||"读取文件失败")}});$("input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});$("input").addEventListener("input",autoSize);$("memoryQuery").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();loadMemories()}})}
    async function init(){bind();renderModelOptions();applyLayoutState();updateComposeMeta();await checkBackend();await loadGlobalSettings();await loadRoles(true)}
    init().catch(e=>{console.error(e);toast("初始化失败")});
  </script>
</body>
